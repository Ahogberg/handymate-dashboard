name: Playwright QA Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # Varje natt 03:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: handymate-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: https://app.handymate.se
          TEST_USER_EMAIL: andreashogberg93@gmail.com
          TEST_BUSINESS_ID: biz_al7pjuu5smi
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: npx playwright test --project=chromium

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: handymate-dashboard/playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        run: |
          echo "Playwright-tester misslyckades!"
          echo "Se rapport: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
